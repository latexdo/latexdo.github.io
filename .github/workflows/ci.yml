name: website-ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: website-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: typecheck / build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - name: Verify compiled JavaScript is committed
        run: git diff --exit-code -- assets/site.js
